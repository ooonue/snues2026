        function search() {
            const input = document.getElementById('studentId').value.trim();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';

            if (!input) {
                resultDiv.innerHTML = '<p class="error">학번을 입력해 주세요.</p>';
                return;
            }

            if (data[input]) {
                data[input].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="field"><span class="label">차수</span><span class="value">${item.차수}</span></div>
                        <div class="field"><span class="label">이름</span><span class="value">${item.이름}</span></div>
                        <div class="field"><span class="label">학과</span><span class="value">${item.학과}</span></div>
                        <div class="field"><span class="label">배정학급</span><span class="value" style="color:#e67e22; font-size: 1.1em;">${item.배정학급}</span></div>
                        <div class="field"><span class="label">지도교사</span><span class="value">${item.지도교사}</span></div>
                    `;
                    resultDiv.appendChild(card);
                });
            } else {
                resultDiv.innerHTML = '<p class="error">해당 학번에 대한 정보를 찾을 수 없습니다.</p>';
            }
        }
